<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Biass Playlist</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        .desktop-screen {
            background: url('https://i.pinimg.com/1200x/37/f9/6e/37f96e5603307d23ac4a1013f478fbea.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Window Style (Mirip Gambar #5) */
        .window {
            width: 92%; max-width: 380px;
            background: #121212; border-radius: 8px 8px 0 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column;
            animation: zoomIn 0.3s ease-out;
            z-index: 10;
        }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Title Bar Putih */
        .title-bar {
            background: #ffffff; padding: 8px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .title-left { font-size: 12px; color: #333; display: flex; align-items: center; gap: 8px; }
        .title-controls { display: flex; gap: 12px; font-size: 14px; color: #666; }
        .close-btn:hover { color: red; cursor: pointer; }

        /* Area Konten Spotify */
        .content-body {
            padding: 15px;
            background: linear-gradient(to bottom, #1e1e1e, #121212);
            min-height: 400px;
        }

        .spotify-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #282828;
            padding: 10px;
        }

        .music-info {
            margin-top: 15px;
            padding: 0 5px;
            color: white;
        }

        .current-playlist {
            font-size: 16px;
            font-weight: bold;
            color: #1db954; /* Hijau Spotify */
            margin-bottom: 5px;
        }

        .playlist-description {
            font-size: 12px;
            color: #b3b3b3;
            line-height: 1.4;
        }

        /* Taskbar Bawah */
        .desktop-taskbar {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; color: white;
        }

        .active-app-indicator { border-bottom: 3px solid #1db954; padding-bottom: 3px; }
        .taskbar-right { text-align: right; font-size: 11px; }
    </style>
</head>
<body>

    <div class="desktop-screen">
        <div class="window">
            <div class="title-bar">
                <div class="title-left">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" width="16"> Spotify
                </div>
                <div class="title-controls">
                    <span>—</span> <span>❐</span> <span class="close-btn" onclick="location.href='desktop.html'">×</span>
                </div>
            </div>

            <div class="content-body">
                <div class="spotify-container">
                    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/1Vp7mHpI7FXV8HQEcdQtvs?utm_source=generator" 
                    width="100%" height="352" 
                    frameBorder="0" allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; 
                    fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <div class="music-info">
                    <div class="current-playlist">Now Playing: Biass Favorite</div>
                    <div class="playlist-description">Kumpulan lagu pilihan untuk menemani hari spesialmu. Enjoy the music! ✨</div>
                </div>
            </div>
        </div>

        <div class="desktop-taskbar">
            <div class="taskbar-left" style="display:flex; align-items:center; gap:15px;">
                <span style="font-size: 22px;">⊞</span>
                <span style="font-size: 18px;">🔍</span>
                <div class="active-app-indicator">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" width="20">
                </div>
            </div>
            <div class="taskbar-right">
                <div id="time">00.00</div>
                <div id="date">00/00/0000</div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.getHours().toString().padStart(2,'0') + "." + now.getMinutes().toString().padStart(2,'0');
            document.getElementById('date').textContent = now.getDate().toString().padStart(2,'0') + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getFullYear();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
