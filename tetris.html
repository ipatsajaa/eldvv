<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris OS - Windows Style</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }

        /* Background Desktop */
        .desktop-screen {
            background: url('https://i.pinimg.com/1200x/37/f9/6e/37f96e5603307d23ac4a1013f478fbea.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* WINDOW APLIKASI PC */
        .window-pc {
            width: 340px;
            background: #f0f0f0;
            border: 1px solid #004578;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 50px; /* Biar gak ketutup taskbar */
        }

        /* Title Bar (Bagian Atas Jendela) */
        .title-bar {
            background: linear-gradient(to right, #0078d7, #005a9e);
            color: white;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .title-text { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .window-controls { display: flex; gap: 15px; font-size: 14px; }
        .window-controls span { cursor: pointer; opacity: 0.8; }
        .window-controls span:hover { opacity: 1; }

        /* Area Game di dalam Jendela */
        .window-content {
            padding: 15px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-stats-pc {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #0078d7;
            background: #fff;
            padding: 5px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        #tetris-canvas {
            background: #ffffff;
            border: 2px solid #333;
            box-shadow: inset 0 0 10px #000;
        }

        /* Kontrol Bawah */
        .tetris-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
            width: 100%;
        }

        .tetris-btn {
            background: #e1e1e1;
            border: 1px solid #adadad;
            color: #333;
            padding: 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
        }

        .tetris-btn:active { background: #c1c1c1; }
        .menyerah-btn { grid-column: span 3; background: #ff4d4d; color: white; border: none; }

        /* TASKBAR (IDENTIK DENGAN PC/INDEX) */
        .desktop-taskbar {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 48px;
            background: rgba(0, 120, 215, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }

        .taskbar-left { display: flex; align-items: center; gap: 5px; }
        .win-btn { 
            background: transparent; border: none; color: white; 
            font-size: 24px; padding: 5px 10px; cursor: pointer; 
        }
        .win-btn:hover { background: rgba(255,255,255,0.1); }
        
        .search-box {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 4px;
            color: white;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 150px;
        }

        .taskbar-right { color: white; text-align: right; font-size: 12px; padding-right: 5px; }

        /* MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 12px; text-align: center;
            max-width: 320px; border: 2px solid #0078d7;
        }
        .modal-btn { background: #0078d7; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div class="desktop-screen">
        
        <div class="window-pc">
            <div class="title-bar">
                <div class="title-text">
                    <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" width="16" alt="">
                    Tetris Professional Edition
                </div>
                <div class="window-controls">
                    <span>—</span>
                    <span>⬜</span>
                    <span onclick="location.href='index.html'">✕</span>
                </div>
            </div>
            
            <div class="window-content">
                <div class="game-stats-pc">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>LEVEL: <span id="level">1</span></span>
                </div>

                <canvas id="tetris-canvas" width="240" height="380"></canvas>
                
                <div class="tetris-controls">
                    <button class="tetris-btn" onclick="playerMove(-1)">LEFT</button>
                    <button class="tetris-btn" onclick="playerRotate(1)">ROTATE</button>
                    <button class="tetris-btn" onclick="playerMove(1)">RIGHT</button>
                    <button class="tetris-btn menyerah-btn" onclick="gameOver()">CLOSE GAME (GIVE UP)</button>
                </div>
            </div>
        </div>

        <div class="desktop-taskbar">
            <div class="taskbar-left">
                <button class="win-btn" onclick="location.href='index.html'">⊞</button>
              
                    <span>🔍</span> 
              
            </div>
            <div class="taskbar-right">
                <div id="taskbar-time" style="font-weight: bold;">00:00</div>
                <div id="taskbar-date">00/00/0000</div>
            </div>
        </div>
    </div>

    <div id="final-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:#0078d7; margin-top:0;">INGET YA!</h2>
            <p>Walaupun kamu kalah di game ini,</p>
            <p>Tapi kamu <strong>selalu menang</strong> di hati aku!</p>
            <p style="font-size: 24px;">HEHE ^_^</p>
            <p style="color:#e74c3c; font-weight:bold; font-size:20px;">HAPPY BIRTHDAY! 🎂</p>
            <button class="modal-btn" onclick="location.reload()">MAIN LAGI</button>
            <button class="modal-btn" style="background:#888" onclick="location.href='index.html'">KELUAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris-canvas');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        function createPiece(t) {
            if (t === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (t === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (t === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (t === 'O') return [[4,4],[4,4]];
            if (t === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (t === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (t === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        const arena = Array.from({length: 19}, () => Array(12).fill(0));
        const player = { pos: {x: 4, y: 0}, matrix: createPiece('T'), score: 0 };

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x:0, y:0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(m, o) {
            const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];
            m.forEach((row, y) => {
                row.forEach((val, x) => {
                    if (val !== 0) {
                        context.fillStyle = colors[val];
                        context.fillRect(x + o.x, y + o.y, 0.9, 0.9);
                    }
                });
            });
        }

        function collide(a, p) {
            const [m, o] = [p.matrix, p.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (a[y+o.y] && a[y+o.y][x+o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(a, p) {
            p.matrix.forEach((row, y) => {
                row.forEach((val, x) => {
                    if (val !== 0) a[y + p.pos.y][x + p.pos.x] = val;
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(d) {
            player.pos.x += d;
            if (collide(arena, player)) player.pos.x -= d;
        }

        function playerRotate(d) {
            const pos = player.pos.x;
            let offset = 1;
            const m = player.matrix;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
            }
            m.forEach(row => row.reverse());
            if (collide(arena, player)) player.pos.x = pos;
        }

        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                player.score += 10;
                document.getElementById('score').innerText = player.score;
            }
        }

        function playerReset() {
            const p = 'ILJOTSZ';
            player.matrix = createPiece(p[p.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = 4;
            if (collide(arena, player)) gameOver();
        }

        function gameOver() {
            document.getElementById('final-modal').style.display = 'flex';
            cancelAnimationFrame(gameId);
        }

        let dropCounter = 0;
        let lastTime = 0;
        let gameId;

        function update(time = 0) {
            const dt = time - lastTime;
            lastTime = time;
            dropCounter += dt;
            if (dropCounter > 1000) playerDrop();
            draw();
            gameId = requestAnimationFrame(update);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('taskbar-time').textContent = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            document.getElementById('taskbar-date').textContent = now.getDate().toString().padStart(2,'0') + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getFullYear();
        }

        setInterval(updateClock, 1000);
        updateClock();
        playerReset();
        update();
    </script>
</body>
</html>
