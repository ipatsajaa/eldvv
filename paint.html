<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint - Birthday Art</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
            background: #000;
        }

        .desktop-screen {
            background: url('https://i.pinimg.com/1200x/37/f9/6e/37f96e5603307d23ac4a1013f478fbea.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Window Style (Gambar #7) */
        .window {
            width: 92%; max-width: 380px;
            background: #f0f0f0; border-radius: 8px 8px 0 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column;
            animation: zoomIn 0.3s ease-out;
            z-index: 10;
        }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Title Bar */
        .title-bar {
            background: #ffffff; padding: 6px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .title-left { font-size: 12px; color: #333; display: flex; align-items: center; gap: 5px; }
        .title-controls { display: flex; gap: 12px; font-size: 14px; color: #666; }
        .close-btn:hover { color: red; cursor: pointer; }

        /* Toolbar (Sesuai Gambar #7) */
        .toolbar {
            padding: 10px; background: #e1e1e1;
            display: flex; flex-direction: column; gap: 10px;
        }

        .tools-row { display: flex; gap: 8px; align-items: center; }
        
        .tool-btn {
            width: 32px; height: 32px; background: white; border: 1px solid #ccc;
            border-radius: 4px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 14px;
        }
        .tool-btn.active { background: #0078d4; color: white; border-color: #005a9e; }

        .colors-grid { display: flex; flex-wrap: wrap; gap: 5px; }
        .color-circle {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid white;
            cursor: pointer; box-shadow: 0 0 2px rgba(0,0,0,0.2);
        }
        .color-circle.active { transform: scale(1.2); border-color: #333; }

        /* Canvas Area */
        .canvas-container {
            background: white; flex: 1; position: relative;
            height: 350px; cursor: crosshair;
        }
        canvas { width: 100%; height: 100%; touch-action: none; }

        /* Bottom Status Bar */
        .status-bar {
            background: #f0f0f0; padding: 5px 10px;
            font-size: 11px; color: #666; display: flex; justify-content: space-between;
            border-top: 1px solid #ddd;
        }

        /* Taskbar Bawah */
        .desktop-taskbar {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; color: white;
        }
        .active-app-indicator { border-bottom: 3px solid #f24e1e; padding-bottom: 3px; }
    </style>
</head>
<body>

    <div class="desktop-screen">
        <div class="window">
            <div class="title-bar">
                <div class="title-left">🖌 Paint</div>
                <div class="title-controls">
                    <span>—</span> <span>❐</span> <span class="close-btn" onclick="location.href='desktop.html'">×</span>
                </div>
            </div>

            <div class="toolbar">
                <div class="tools-row">
                    <div class="tool-btn active" id="brush-tool" title="Brush">🖌</div>
                    <div class="tool-btn" id="eraser-tool" title="Eraser">🧽</div>
                    <div class="tool-btn" onclick="clearCanvas()" title="Clear">🗑</div>
                    <div style="margin-left: auto; display: flex; gap: 5px;">
                        <input type="range" id="size-slider" min="1" max="20" value="5" style="width: 60px;">
                    </div>
                </div>

                <div class="colors-grid">
                    <div class="color-circle active" style="background: #000000;" data-color="#000000"></div>
                    <div class="color-circle" style="background: #ffffff; border: 1px solid #ccc;" data-color="#ffffff"></div>
                    <div class="color-circle" style="background: #ff0000;" data-color="#ff0000"></div>
                    <div class="color-circle" style="background: #00ff00;" data-color="#00ff00"></div>
                    <div class="color-circle" style="background: #0000ff;" data-color="#0000ff"></div>
                    <div class="color-circle" style="background: #ffff00;" data-color="#ffff00"></div>
                    <div class="color-circle" style="background: #ff00ff;" data-color="#ff00ff"></div>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="paint-canvas"></canvas>
            </div>

            <div class="status-bar">
                <span id="tool-name">Tool: Brush</span>
                <span id="size-label">Size: 5px</span>
                <span id="color-label">Color: #000000</span>
            </div>
        </div>

        <div class="desktop-taskbar">
            <div class="taskbar-left" style="display:flex; align-items:center; gap:15px;">
                <span style="font-size: 22px;">⊞</span>
                <span style="font-size: 18px;">🔍</span>
                <div class="active-app-indicator">🖌</div>
            </div>
            <div class="taskbar-right" style="font-size: 11px; text-align: right;">
                <div id="time">00.00</div>
                <div id="date">00/00/0000</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let brushColor = '#000000';
        let brushSize = 5;
        let isEraser = false;

        // Resize canvas to fit container
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;

            // Handle touch or mouse
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = brushSize;
            ctx.strokeStyle = isEraser ? '#ffffff' : brushColor;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', draw);

        // Tool Logic
        document.querySelectorAll('.color-circle').forEach(circle => {
            circle.addEventListener('click', () => {
                document.querySelector('.color-circle.active').classList.remove('active');
                circle.classList.add('active');
                brushColor = circle.getAttribute('data-color');
                isEraser = false;
                updateStatus();
            });
        });

        document.getElementById('brush-tool').addEventListener('click', () => {
            isEraser = false;
            document.getElementById('brush-tool').classList.add('active');
            document.getElementById('eraser-tool').classList.remove('active');
            updateStatus();
        });

        document.getElementById('eraser-tool').addEventListener('click', () => {
            isEraser = true;
            document.getElementById('eraser-tool').classList.add('active');
            document.getElementById('brush-tool').classList.remove('active');
            updateStatus();
        });

        document.getElementById('size-slider').addEventListener('input', (e) => {
            brushSize = e.target.value;
            updateStatus();
        });

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateStatus() {
            document.getElementById('tool-name').textContent = `Tool: ${isEraser ? 'Eraser' : 'Brush'}`;
            document.getElementById('size-label').textContent = `Size: ${brushSize}px`;
            document.getElementById('color-label').textContent = `Color: ${isEraser ? '#FFFFFF' : brushColor.toUpperCase()}`;
        }

        // Clock logic
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.getHours().toString().padStart(2,'0') + "." + now.getMinutes().toString().padStart(2,'0');
            document.getElementById('date').textContent = now.getDate().toString().padStart(2,'0') + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getFullYear();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
