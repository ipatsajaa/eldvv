<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera - Windows OS</title>
    <style>
        /* SAMA PERSIS DENGAN INDEX KAMU */
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #000; /* Latar belakang hitam agar kamera stand out */
        }

        .desktop-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Status Bar Atas (Sesuai index) */
        .desktop-status-bar {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 13px;
            padding: 8px 15px;
            font-weight: 500;
            z-index: 10;
            background: rgba(0,0,0,0.3);
        }

        /* CAMERA VIEWPORT */
        .camera-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #videoFeed {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Full Screen */
            transform: scaleX(-1); /* Mirror Mode */
        }

        /* SHUTTER BUTTON */
        .shutter-overlay {
            position: absolute;
            bottom: 80px; /* Di atas taskbar */
            left: 0; width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        .shutter-btn {
            width: 70px;
            height: 70px;
            background: white;
            border: 5px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .shutter-btn:active {
            transform: scale(0.9);
            background: #ddd;
        }

        /* FLASH EFFECT */
        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes triggerFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* TASKBAR (SAMA PERSIS DENGAN INDEX KAMU) */
        .desktop-taskbar {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50px;
            background: rgba(0, 137, 216, 0.85); /* Warna biru khas kamu */
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .taskbar-left { display: flex; gap: 15px; }

        .win-btn, .search-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .taskbar-right {
            color: white;
            text-align: right;
            font-size: 11px;
            line-height: 1.2;
        }

        #hiddenCanvas { display: none; }
    </style>
</head>
<body>

    <div class="desktop-screen">
        <div id="flash"></div>

        <div class="desktop-status-bar">
            <span id="top-time">00:00</span>
            <span>📶 5G 🔋</span>
        </div>

        <div class="camera-container">
            <video id="videoFeed" autoplay playsinline></video>
            
            <div class="shutter-overlay">
                <div class="shutter-btn" onclick="captureAndDownload()"></div>
            </div>
        </div>

        <div class="desktop-taskbar">
            <div class="taskbar-left">
                <button class="win-btn" onclick="window.location.href='index.html'">⊞</button>
                <button class="search-btn">🔍</button>
            </div>
            <div class="taskbar-right">
                <div id="taskbar-time">00.00</div>
                <div id="taskbar-date">00/00/0000</div>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('hiddenCanvas');
        const flash = document.getElementById('flash');

        // Nyalakan Kamera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Akses kamera ditolak.");
            }
        }

        // Ambil Foto & Download Otomatis
        function captureAndDownload() {
            // Efek Flash
            flash.style.animation = 'none';
            void flash.offsetWidth; 
            flash.style.animation = 'triggerFlash 0.4s ease-out forwards';

            // Gambar ke Canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Mirroring
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);

            // Download Otomatis
            const link = document.createElement('a');
            link.download = `IMG_WIN_${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        // Fungsi Update Jam (Sesuai Logic Index Kamu)
        function updateClock() {
            const sekarang = new Date();
            const jam = String(sekarang.getHours()).padStart(2, '0');
            const menit = String(sekarang.getMinutes()).padStart(2, '0');
            const tgl = String(sekarang.getDate()).padStart(2, '0');
            const bln = String(sekarang.getMonth() + 1).padStart(2, '0');
            const thn = sekarang.getFullYear();

            // Atas
            document.getElementById('top-time').textContent = `${jam}:${menit}`;
            // Taskbar (Format 21.14)
            document.getElementById('taskbar-time').textContent = `${jam}.${menit}`;
            document.getElementById('taskbar-date').textContent = `${tgl}/${bln}/${thn}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
        window.onload = initCamera;
    </script>
</body>
</html>
